services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # AI API keys (uncomment and fill in as needed)
      # OPENAI_API_KEY=${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
    volumes:
      # Persist compiled PDFs and any runtime-generated files
      - compiled-cvs:/app/public/compiled-cvs

volumes:
  compiled-cvs:
